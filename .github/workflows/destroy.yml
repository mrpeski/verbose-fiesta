name: Destroy Alex
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (e.g. dev, prod)"
        required: true
        default: dev
      confirm:
        description: "Type 'destroy' to confirm"
        required: true
permissions:
  id-token: write
  contents: read
jobs:
  destroy:
    runs-on: ubuntu-latest
    if: inputs.confirm == 'destroy'
    environment: ${{ inputs.environment }}
    env:
      TF_VAR_aws_region: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Destroy – Agents
        working-directory: ./terraform/6_agents
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
      - name: Terraform Destroy – Database
        working-directory: ./terraform/5_database
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
      - name: Terraform Destroy – Researcher
        working-directory: ./terraform/4_researcher
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
      - name: Terraform Destroy – Ingestion
        working-directory: ./terraform/3_ingestion
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
      - name: Terraform Destroy – SageMaker
        working-directory: ./terraform/2_sagemaker
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
