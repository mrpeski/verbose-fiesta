name: Deploy Alex

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (e.g. dev, prod)"
        required: true
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_VAR_aws_region: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Removed: uv sync --all-extras (no root pyproject.toml exists)
      # Each component has its own uv project

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init & Apply – SageMaker
        working-directory: ./terraform/2_sagemaker
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform Init & Apply – Ingestion
        working-directory: ./terraform/3_ingestion
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform Init & Apply – Researcher
        working-directory: ./terraform/4_researcher
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform Init & Apply – Database
        working-directory: ./terraform/5_database
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform Init & Apply – Agents
        working-directory: ./terraform/6_agents
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Run front‑end deployment script
        run: |
          uv run scripts/deploy.py
